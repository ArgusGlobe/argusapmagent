syntax = "proto3";

package argus.hermes.v1;

option go_package = "github.com/argus/ecs-fargate-agent/internal/hermespb;hermespb";

import "google/protobuf/timestamp.proto";

enum LaunchType {
  LAUNCH_TYPE_UNSPECIFIED = 0;
  LAUNCH_TYPE_EC2 = 1;
  LAUNCH_TYPE_FARGATE = 2;
}

message ContainerSample {
  string container_name = 1;
  double cpu_percent = 2;
  uint64 mem_usage_bytes = 3;
  uint64 mem_limit_bytes = 4;
  double mem_percent = 5;
  uint64 net_rx_bytes = 6;
  uint64 net_tx_bytes = 7;
  uint64 blk_read_bytes = 8;
  uint64 blk_write_bytes = 9;
  int32 restart_count = 10;
  google.protobuf.Timestamp timestamp = 11;
}

message LogLine {
  string container_name = 1;
  string stream = 2;
  string message = 3;
  google.protobuf.Timestamp timestamp = 4;
  string severity = 5;
  string trace_id = 6;
  string span_id = 7;
  repeated Label labels = 8;
}

message Label {
  string key = 1;
  string value = 2;
}

message AppMetric {
  string container_name = 1;
  string namespace = 2;
  string name = 3;
  double value = 4;
  string unit = 5;
  repeated Label labels = 6;
  google.protobuf.Timestamp timestamp = 7;
}

message NetworkCall {
  string container_name = 1;
  string direction = 2;
  string protocol = 3;
  string method = 4;
  string peer = 5;
  string host = 6;
  string path = 7;
  int32 status_code = 8;
  double duration_ms = 9;
  uint64 bytes_in = 10;
  uint64 bytes_out = 11;
  string error = 12;
  google.protobuf.Timestamp timestamp = 13;
}

message LogRollup {
  string container_name = 1;
  string stream = 2;
  string level = 3;
  string fingerprint = 4;
  uint64 count = 5;
  string sample_message = 6;
  google.protobuf.Timestamp first_seen = 7;
  google.protobuf.Timestamp last_seen = 8;
}

message Batch {
  string agent_id = 1;
  string cluster = 2;
  string service = 3;
  string task_arn = 4;
  LaunchType launch_type = 5;
  repeated ContainerSample samples = 6;
  repeated LogLine logs = 7;
  google.protobuf.Timestamp sent_at = 8;
  repeated AppMetric app_metrics = 9;
  repeated NetworkCall network = 10;
  repeated LogRollup log_rollups = 11;
}

message PushAck {
  bool accepted = 1;
  uint32 samples_received = 2;
  uint32 logs_received = 3;
}

message StreamSummary {
  uint32 batches = 1;
  uint32 samples = 2;
  uint32 logs = 3;
}

service Ingest {
  rpc PushBatch(Batch) returns (PushAck);
  rpc StreamBatches(stream Batch) returns (StreamSummary);
}
